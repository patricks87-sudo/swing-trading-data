name: Fetch Market Data

# Laeuft alle 5 Minuten im Fenster 12:00-16:59 UTC (deckt Sommer- und
# Winterzeit automatisch ab, keine manuelle Anpassung im Oktober mehr
# noetig). Welcher der 4 Laeufe (P4/P5/P5.5/P1) tatsaechlich ausgefuehrt
# wird, entscheidet das Script scripts/determine_run.py anhand der
# aktuellen Uhrzeit in Europe/Berlin (automatisch MESZ/MEZ-korrekt) und
# einem 25-Minuten-Toleranzfenster. Faellt ein Tick aus oder kommt
# verspaetet, springt automatisch der naechste Tick ein statt dass ein
# ganzer Lauf ausfaellt (Ursache 1: GitHub-Cron-Trigger sind nicht 100%
# zuverlaessig/puenktlich).

on:
  schedule:
    - cron: "*/5 12-16 * * 1-5"
  workflow_dispatch:
    inputs:
      run:
        description: "Welcher Lauf soll ausgefuehrt werden?"
        required: true
        default: "p4"
        type: choice
        options: [p4, p5, p55, p1]

permissions:
  contents: write

# Verhindert, dass sich zeitgleiche/verspaetete Laeufe ueberlappen.
concurrency:
  group: fetch-market-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas

      - name: Determine run label
        id: label
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=${{ inputs.run }}" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            python3 scripts/determine_run.py
          fi

      - name: Fetch data
        if: steps.label.outputs.skip != 'true'
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
        run: python fetch_market_data.py --run ${{ steps.label.outputs.run }}

      - name: Commit and push results
        if: steps.label.outputs.skip != 'true'
        run: |
          git config user.name "market-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --quiet --cached || git commit -m "data: ${{ steps.label.outputs.run }} snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
